<title>Glasinstallningar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#f0a500; --text:#e8eaf0; --muted:#7a7f96; --red:#e74c3c; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
  header { background:linear-gradient(135deg,#1a1d27,#0f1117); border-bottom:3px solid var(--accent); padding:20px 28px 18px; }
  header p { color:var(--muted); font-size:0.8rem; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
  header h1 { font-family:'Barlow Condensed',sans-serif; font-size:2.2rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; line-height:1; }
  header h1 span { color:var(--accent); }
  .count-pill { display:inline-block; background:var(--accent); color:#000; font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; font-weight:900; padding:2px 10px; border-radius:20px; margin-left:12px; letter-spacing:1px; vertical-align:middle; }
  .search-wrap { padding:22px 28px 0; max-width:860px; }
  .search-box { display:flex; gap:10px; }
  .search-box input { flex:1; background:var(--surface); border:2px solid var(--border); border-radius:6px; color:var(--text); font-family:'Barlow',sans-serif; font-size:1.05rem; padding:13px 18px; outline:none; transition:border-color 0.2s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box input::placeholder { color:var(--muted); }
  .clear-btn { background:var(--surface); border:2px solid var(--border); border-radius:6px; color:var(--muted); cursor:pointer; font-size:1.1rem; padding:11px 16px; transition:all 0.2s; }
  .clear-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filters { padding:14px 28px 0; display:flex; gap:7px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:20px; color:var(--muted); cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-size:0.82rem; font-weight:600; letter-spacing:1px; padding:5px 14px; text-transform:uppercase; transition:all 0.2s; }
  .filter-btn:hover,.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }
  .results-header { padding:16px 28px 10px; color:var(--muted); font-size:0.78rem; letter-spacing:1.5px; text-transform:uppercase; }
  .results-header span { color:var(--accent); font-weight:600; }
  .grid { padding:0 28px 40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .card { background:var(--surface); border:1.5px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color 0.2s,transform 0.15s; }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .card-head { background:linear-gradient(90deg,#21243a,#1a1d27); padding:12px 16px 10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .card-title { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; line-height:1.2; }
  .brand-tag { color:var(--muted); font-size:0.68rem; letter-spacing:1px; margin-bottom:3px; }
  .rec-badge { background:var(--accent); border-radius:4px; color:#000; font-family:'Barlow Condensed',sans-serif; font-size:0.88rem; font-weight:900; padding:3px 9px; white-space:nowrap; letter-spacing:1px; flex-shrink:0; }
  .obs-tag { display:inline-block; background:rgba(231,76,60,0.15); border:1px solid var(--red); border-radius:4px; color:var(--red); font-size:0.68rem; font-weight:600; letter-spacing:1px; padding:2px 7px; margin-top:5px; text-transform:uppercase; }
  .card-body { padding:12px 16px 14px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .stat { display:flex; flex-direction:column; gap:2px; }
  .stat-label { color:var(--muted); font-size:0.68rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
  .stat-value { font-family:'Barlow Condensed',sans-serif; font-size:1.35rem; font-weight:700; line-height:1; }
  .stat-value.hl { color:var(--accent); }
  .stat-value.na { color:var(--muted); font-size:0.95rem; }
  .uppr-row { grid-column:1/-1; background:#12151f; border-radius:6px; padding:9px 12px; margin-top:2px; }
  .uppr-label { color:var(--muted); font-size:0.68rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
  .uppr-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
  .uppr-cell { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:5px 3px; text-align:center; }
  .uppr-cell.u1 { border-color:var(--accent); background:#1e1a0e; }
  .uppr-cell-lbl { color:var(--muted); font-size:0.58rem; letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:1px; }
  .uppr-cell-val { font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:700; display:block; }
  .uppr-cell.u1 .uppr-cell-val { color:var(--accent); font-size:1.2rem; }
  .uppr-cell-val.na { color:var(--border); font-size:0.75rem; }
  .note { grid-column:1/-1; color:var(--muted); font-size:0.75rem; font-style:italic; line-height:1.4; margin-top:1px; }
  .empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; letter-spacing:1px; }
  @media(max-width:600px){
    header,.search-wrap,.filters,.results-header,.grid{padding-left:14px;padding-right:14px;}
    header h1{font-size:1.7rem;} .grid{grid-template-columns:1fr;}
  }
</style>
</head>

var activeFilter = "Alla";
var searchQuery = "";

function getBrands() {
  var brands = ["Alla"], seen = {};
  for (var i = 0; i < data.length; i++) {
    var m = data[i].marke;
    if (!seen[m]) { seen[m] = true; brands.push(m); }
  }
  return brands;
}

function renderFilters() {
  var html = "", brands = getBrands();
  for (var i = 0; i < brands.length; i++) {
    var b = brands[i];
    html += '<button class="filter-btn'+(b===activeFilter?' active':'')+'" onclick="setFilter(\''+b+'\')">'+b+'</button>';
  }
  document.getElementById("filterBtns").innerHTML = html;
}

function setFilter(brand) { activeFilter = brand; renderFilters(); render(); }

function clearSearch() {
  document.getElementById("searchInput").value = "";
  searchQuery = ""; render();
}

function render() {
  var q = searchQuery.toLowerCase();
  var filtered = [];
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    var matchBrand = activeFilter === "Alla" || d.marke === activeFilter;
    var matchQ = !q || d.bil.toLowerCase().indexOf(q) >= 0
      || d.rec.toLowerCase().indexOf(q) >= 0
      || d.marke.toLowerCase().indexOf(q) >= 0;
    if (matchBrand && matchQ) filtered.push(d);
  }

  document.getElementById("totalCount").textContent = data.length;
  document.getElementById("resultsHeader").innerHTML =
    'Visar <span>'+filtered.length+'</span> av '+data.length+' installningar';

  if (filtered.length === 0) {
    document.getElementById("grid").innerHTML = '<div class="empty">Inga resultat for "'+searchQuery+'"</div>';
    return;
  }

  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var d = filtered[i];
    var uVals = [d.u1, d.u2, d.u3, d.u4, d.u5];
    var upprHtml = "";
    for (var j = 0; j < 5; j++) {
      var val = uVals[j];
      var valStr = (val !== null && val !== undefined) ? val : "—";
      var naClass = (val === null || val === undefined) ? " na" : "";
      upprHtml += '<div class="uppr-cell'+(j===0?' u1':'')+'">'
        +'<span class="uppr-cell-lbl">U'+(j+1)+'</span>'
        +'<span class="uppr-cell-val'+naClass+'">'+valStr+'</span>'
        +'</div>';
    }
    var rygg = d.ryggstod;
    var ryggStr = (rygg !== null && rygg !== undefined) ? rygg : "—";
    var ryggClass = (rygg !== null && rygg !== undefined) ? "hl" : "na";

    html += '<div class="card">'
      +'<div class="card-head">'
      +'<div><div class="brand-tag">'+d.marke+'</div>'
      +'<div class="card-title">'+d.bil+'</div>'
      +(d.obs?'<div class="obs-tag">&#9888; '+d.obs+'</div>':'')
      +'</div>'
      +'<div class="rec-badge">REC '+d.rec+'</div>'
      +'</div>'
      +'<div class="card-body">'
      +'<div class="stat"><span class="stat-label">Ryggstod</span><span class="stat-value '+ryggClass+'">'+ryggStr+'</span></div>'
      +'<div class="stat"><span class="stat-label">Marke</span><span class="stat-value" style="font-size:0.95rem">'+d.marke+'</span></div>'
      +'<div class="uppr-row"><div class="uppr-label">Uppriktning 1–5</div><div class="uppr-grid">'+upprHtml+'</div></div>'
      +(d.note?'<div class="note">&#128221; '+d.note+'</div>':'')
      +'</div></div>';
  }
  document.getElementById("grid").innerHTML = html;
}

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value; render();
});
document.getElementById("clearBtn").addEventListener("click", clearSearch);
renderFilters();
render();
</script>
